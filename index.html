    // Social stub — reemplaza con tu backend real
    async function publishProfile(profile,items){
      try{
        if(window.storage){
          await window.storage.set(`user:${profile.id}`,JSON.stringify({profile:{name:profile.name,bio:profile.bio,photo:profile.photo,id:profile.id},items}),true);
        }
      }catch(e){console.warn("storage no disponible en local",e);}
    }
    async function fetchUserById(id){
      try{
        if(window.storage){
          const res=await window.storage.get(`user:${id.toUpperCase()}`,true);
          if(!res)return null;
          return JSON.parse(res.value);
        }
      }catch{}
      return null;
    }

    async function fetchInfo(title){
      try{
        const r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&language=es-ES`);
        const d=await r.json();
        const result=d.results?.[0];
        if(!result)return null;
        const poster=result.poster_path?`https://image.tmdb.org/t/p/w500${result.poster_path}`:null;
        const year=(result.release_date||result.first_air_date||"").slice(0,4);
        const plot=result.overview||"";
        const genreMap={28:"Acción",12:"Aventura",16:"Animación",35:"Comedia",80:"Crimen",99:"Documental",18:"Drama",14:"Fantasía",36:"Histórica",27:"Terror",9648:"Misterio",10749:"Romance",878:"Ciencia ficción",53:"Thriller",10752:"Bélica",37:"Western"};
        const genre=(result.genre_ids||[]).slice(0,3).map(id=>genreMap[id]).filter(Boolean).join(", ");
        return{poster,year,plot,genre};
      }catch{return null;}
    }

    async function fetchLinkInfo(url){
      try{
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:200,messages:[{role:"user",content:`Given this URL: "${url}", reply ONLY with raw JSON no markdown: {"title":"page title","description":"one sentence in Spanish","type":"Artículo|Vídeo|Herramienta|Tutorial|Noticia|Podcast|Música|Otro","domain":"domain.com"}`}]})});
        const d=await res.json();
        const m=(d.content?.[0]?.text||"").match(/\{[\s\S]*\}/);
        return m?JSON.parse(m[0]):null;
      }catch{return null;}
    }

    function exportToPDF(items,category){
      const list=items.filter(i=>i.category===category);
      const se={"Visto":"🟢","Viendo":"🔵","Pendiente":"🔴"};
      const rows=list.map((item,idx)=>`<tr><td>${idx+1}</td><td><strong>${item.title}</strong></td><td>${item.year||item.domain||"—"}</td><td>${item.genre||"—"}</td><td>${se[item.status]||"🔴"} ${item.status||"Pendiente"}</td><td>${item.rating?"★".repeat(item.rating):"—"}</td></tr>`).join("");
      const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:Arial;background:#03060f;color:#e8f4ff;padding:40px}h1{color:#00d4ff}table{width:100%;border-collapse:collapse}th{text-align:left;padding:10px 8px;color:#00d4ff;font-size:11px;text-transform:uppercase;border-bottom:1px solid rgba(0,212,255,0.2)}td{padding:10px 8px;border-bottom:1px solid rgba(0,212,255,0.08);font-size:13px}</style></head><body><h1>MM · Menuda Movie</h1><p style="color:#6a8aaa">${category} · ${list.length} títulos · ${new Date().toLocaleDateString("es")}</p><table><thead><tr><th>#</th><th>Título</th><th>Año</th><th>Género</th><th>Estado</th><th>Val.</th></tr></thead><tbody>${rows}</tbody></table></body></html>`;
      const w=window.open("","_blank");if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),800);}
    }

    function shareWhatsApp(items,category){
      const list=items.filter(i=>i.category===category);
      const si={"Visto":"✅","Viendo":"⏳","Pendiente":"❌"};
      const lines=list.map((item,i)=>`${i+1}. ${si[item.status]||"❌"} *${item.title}*${item.year?` (${item.year})`:item.domain?` [${item.domain}]`:""}${item.rating?" "+"⭐".repeat(item.rating):""}`).join("\n");
      window.open(`https://wa.me/?text=${encodeURIComponent(`🎬 *MM Menuda Movie*\nMi colección de ${category} (${list.length} títulos):\n\n${lines}\n\n_MM Menuda Movie_`)}`, "_blank");
    }

    // ── COMPONENTS ──────────────────────────────────────────────────────────

    function LogoBase({size,A}){
      const [phase,setPhase]=useState(0);
      const [glitching,setGlitching]=useState(false);
      useEffect(()=>{
        const t=setTimeout(()=>{setGlitching(true);setTimeout(()=>{setPhase(p=>(p+1)%LOGO_PHASES.length);setGlitching(false);},120);},LOGO_PHASES[phase].dur);
        return()=>clearTimeout(t);
      },[phase]);
      const grid=LOGO_PHASES[phase].grid;
      return(
        <svg width={size} height={size} viewBox="0 0 17 16" style={{imageRendering:"pixelated",filter:glitching?`drop-shadow(0 0 6px ${A}) drop-shadow(3px 0 0 rgba(255,0,100,0.8)) drop-shadow(-3px 0 0 rgba(0,255,200,0.8))`:`drop-shadow(0 0 10px ${A}88)`,transform:glitching?"translateX(3px)":"translateX(0)",transition:"filter 0.05s,transform 0.05s"}}>
          {grid.map((row,y)=>row.map((cell,x)=>{if(!cell)return null;return <rect key={`${x}-${y}`} x={x} y={y} width={1} height={1} fill={cell===2?"#0a1628":A}/>;}))}
        </svg>
      );
    }

    function PixelIcon({grid,size=20}){
      return(
        <svg width={size} height={size} viewBox={`0 0 ${grid[0].length} ${grid.length}`} style={{imageRendering:"pixelated",display:"block"}}>
          {grid.map((row,y)=>row.map((cell,x)=>cell?<rect key={`${x}-${y}`} x={x} y={y} width={1} height={1} fill="currentColor"/>:null))}
        </svg>
      );
    }

    function GlitchEffect({onDone}){
      const [frame,setFrame]=useState(0);
      const slicesRef=useRef(Array.from({length:14},()=>({h:Math.random()*16+3,y:Math.random()*100,shift:(Math.random()-0.5)*50,color:Math.random()>0.6,delay:Math.floor(Math.random()*8)})));
      useEffect(()=>{let i=0;const iv=setInterval(()=>{i++;setFrame(i);if(i>=18){clearInterval(iv);onDone();}},28);return()=>clearInterval(iv);},[]);
      return(
        <div style={{position:"fixed",inset:0,zIndex:500,pointerEvents:"none",overflow:"hidden"}}>
          {slicesRef.current.map((s,i)=>frame>s.delay?<div key={i} style={{position:"absolute",left:0,right:0,top:`${s.y}%`,height:`${s.h}px`,transform:`translateX(${s.shift*(frame%2===0?1:-0.7)}px)`,background:s.color?"rgba(0,212,255,0.2)":"rgba(0,0,0,0.5)",mixBlendMode:s.color?"screen":"darken"}}/>:null)}
        </div>
      );
    }

    function ItemCard({item,onClick,idx,A}){
      const genres=item.genre?item.genre.split(/[,\/]/).map(g=>g.trim()).filter(Boolean).slice(0,2):[];
      const sc=STATUS_COLOR[item.status]||STATUS_COLOR["Pendiente"];
      const [tilt,setTilt]=useState({x:0,y:0,shine:50});
      const cardRef=useRef(null);
      function handleMove(e){const card=cardRef.current;if(!card)return;const rect=card.getBoundingClientRect();const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;const x=(cx-rect.left)/rect.width,y=(cy-rect.top)/rect.height;setTilt({x:(y-0.5)*24,y:(x-0.5)*-24,shine:x*100});}
      function handleLeave(){setTilt({x:0,y:0,shine:50});}
      return(
        <div ref={cardRef} onMouseMove={handleMove} onMouseLeave={handleLeave} onTouchMove={handleMove} onTouchEnd={handleLeave} onClick={onClick} className="card-item"
          style={{animationDelay:`${idx*0.06}s`,cursor:"pointer",aspectRatio:"2/3",position:"relative",transform:`rotateX(${tilt.x}deg) rotateY(${tilt.y}deg) scale(${tilt.x||tilt.y?1.04:1})`,transition:tilt.x||tilt.y?"transform 0.05s":"transform 0.4s ease",transformStyle:"preserve-3d",perspective:"600px"}}>
          <div style={{position:"absolute",inset:0,overflow:"hidden",background:`linear-gradient(160deg,${PANEL},${SURFACE2})`,outline:`1px solid ${A}22`,borderRadius:2}}>
            <div style={{position:"absolute",inset:0,zIndex:3,pointerEvents:"none",background:`radial-gradient(circle at ${tilt.shine}% ${50+tilt.x}%, rgba(255,255,255,0.1) 0%, transparent 60%)`,transition:"background 0.05s"}}/>
            {item.poster?<img src={item.poster} alt={item.title} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>:<div style={{position:"absolute",inset:0,backgroundImage:`linear-gradient(${BORDER} 1px,transparent 1px),linear-gradient(90deg,${BORDER} 1px,transparent 1px)`,backgroundSize:"14px 14px",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:24,opacity:0.12,color:A,fontFamily:"monospace"}}>{CAT_ICONS[item.category]}</span></div>}
            <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(3,6,15,0.98))",padding:"20px 7px 7px",zIndex:2}}>
              {genres.length>0&&<div style={{display:"flex",gap:3,marginBottom:3}}>{genres.map(g=><span key={g} style={{padding:"1px 4px",fontSize:7,color:A,border:`0.5px solid ${A}44`,fontFamily:"monospace"}}>{g.toUpperCase()}</span>)}</div>}
              <div style={{color:"#fff",fontSize:12,fontWeight:700,lineHeight:1.3,fontFamily:"'Courier New',monospace",textShadow:"0 1px 4px rgba(0,0,0,0.8)"}}>{item.title}</div>
              {item.year&&<div style={{color:TEXT2,fontSize:9,fontFamily:"monospace"}}>{item.year}</div>}
            </div>
            <div style={{position:"absolute",top:5,left:5,width:7,height:7,background:sc,boxShadow:`0 0 6px ${sc}`,zIndex:2}}/>
            {item.rating>0&&<div style={{position:"absolute",top:4,right:4,fontSize:8,color:A,fontFamily:"monospace",background:`${A}18`,border:`0.5px solid ${A}`,padding:"1px 4px",zIndex:2}}>{item.rating}◆</div>}
          </div>
        </div>
      );
    }

    function App(){

      const clickCountRef=useRef(0);const clickTimerRef=useRef(null);const shakeRef=useRef({lastX:null,lastY:null,lastT:null});const glitchFrameRef=useRef(null);

      function triggerGlitch(intensity=1,originY=null){
        if(glitchFrameRef.current)cancelAnimationFrame(glitchFrameRef.current);
        const pct=originY!==null?(originY/window.innerHeight)*100:50;
        const startTime=performance.now();const totalDur=140+intensity*200;
        const sc=Array.from({length:Math.floor(5+intensity*7)},()=>({y:Math.max(0,Math.min(97,pct+(Math.random()-0.5)*70*intensity)),h:Math.random()<0.45?Math.random()*1.2+0.2:Math.random()<0.7?Math.random()*5+1:Math.random()*14+3,maxShift:(Math.random()-0.5)*90*intensity,kind:Math.random(),phase:Math.random()*Math.PI*2,freq:1.5+Math.random()*7}));
        function frame(now){
          const t=(now-startTime)/totalDur;if(t>=1){setGlitches([]);return;}
          const env=t<0.06?t/0.06:Math.pow(1-((t-0.06)/0.94),0.55);
          const slices=sc.map((s,i)=>{if(Math.sin(t*s.freq*Math.PI+s.phase)<=0.05)return null;const shift=s.maxShift*env*(0.6+0.4*Math.sin(t*s.freq*5+s.phase));const flicker=0.35+0.65*Math.abs(Math.sin(t*35+i*1.3));let bg,blend;if(s.kind<0.5){bg=`rgba(0,0,0,${Math.min(env*flicker*0.65,0.6)})`;blend="darken";}else if(s.kind<0.8){bg=`rgba(0,180,210,${Math.min(env*flicker*0.18,0.18)})`;blend="screen";}else{bg=`rgba(180,210,255,${Math.min(env*flicker*0.1,0.1)})`;blend="screen";}return{id:i,type:"slice",y:s.y,h:s.h,shift,bg,blend};}).filter(Boolean);
          const ca=env*(4+intensity*8);
          const rgbs=[{id:100,type:"rgb",ch:"r",shift:ca*(0.6+0.4*Math.sin(t*18)),op:Math.min(env*0.10,0.10)},{id:101,type:"rgb",ch:"b",shift:-ca*(0.7+0.3*Math.sin(t*15+1)),op:Math.min(env*0.09,0.09)},{id:102,type:"rgb",ch:"g",shift:ca*0.12*Math.sin(t*28),op:Math.min(env*0.04,0.04)}];
          const tear=(Math.sin(t*55)*0.5+0.5)>0.93?[{id:200,type:"tear",y:pct+Math.sin(t*11)*18,h:1,op:Math.min(env*0.45,0.45)}]:[];
          const block=intensity>1.2&&env>0.25&&Math.sin(t*3+1)>0.72?[{id:300,type:"block",y:pct+Math.sin(t*6)*12,h:6+intensity*5,shift:Math.sin(t*10)*50*intensity,op:Math.min(env*0.55,0.55)}]:[];
          setGlitches([...slices,...rgbs,...tear,...block]);glitchFrameRef.current=requestAnimationFrame(frame);
        }
        glitchFrameRef.current=requestAnimationFrame(frame);
      }

      function handleEmptyClick(e){const x=e.clientX,y=e.clientY,id=Date.now()+Math.random();setFingerprints(f=>[...f,{id,x,y}]);setTimeout(()=>setFingerprints(f=>f.filter(p=>p.id!==id)),1800);clickCountRef.current+=1;clearTimeout(clickTimerRef.current);triggerGlitch(clickCountRef.current,y);clickTimerRef.current=setTimeout(()=>{clickCountRef.current=0;},1200);}

      useEffect(()=>{

        window.addEventListener("devicemotion",handleMotion);return()=>window.removeEventListener("devicemotion",handleMotion);

      const matchesGenre=(ig,f)=>{if(f==="Todas"||f==="Todos")return true;if(!ig)return false;const n=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[-\s]/g,"");const ff=n(f);return ig.split(/[,\/]/).map(g=>n(g.trim())).some(g=>g.includes(ff)||ff.includes(g));};

              </div>
            </div>
            {showSettings&&(<div style={{background:PANEL2,border:`0.5px solid ${A}44`,borderTop:"none",padding:"14px"}}><div style={{fontSize:9,color:TEXT3,fontFamily:"monospace",letterSpacing:"0.14em",marginBottom:12}}>// ACENTO</div><div style={{display:"flex",gap:8}}>{ACCENTS.map(ac=>(<button key={ac.color} onClick={()=>{setAccent(ac.color);setShowSettings(false);}} style={{flex:1,padding:"10px 0",border:A===ac.color?`1.5px solid ${ac.color}`:`0.5px solid ${ac.color}44`,background:A===ac.color?`${ac.color}18`:"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"all 0.15s"}}><div style={{width:20,height:20,borderRadius:10,background:ac.color,boxShadow:A===ac.color?`0 0 10px ${ac.color}`:""}}/><span style={{fontSize:8,fontFamily:"monospace",color:A===ac.color?ac.color:TEXT3,letterSpacing:"0.08em"}}>{ac.name}</span></button>))}</div></div>)}
          </div>

          <div style={{padding:"14px 12px 8px",zIndex:10,position:"relative"}}>
            <div style={{position:"relative",background:PANEL2,border:`0.5px solid ${A}44`,borderRadius:2,padding:"8px 12px"}}>
              <div style={{position:"absolute",top:-9,left:10,background:PANEL2,padding:"0 6px",fontSize:10,color:A,fontFamily:"'Courier New',monospace",fontWeight:700}}>STATUS</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:4}}>
                <div style={{display:"flex",gap:14}}>{[["VISTO","#00ff88"],["VIENDO",A],["PENDIENTE","#ff3366"]].map(([s,c])=>(<div key={s} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:7,height:7,background:c,boxShadow:`0 0 5px ${c}`}}/><span style={{fontSize:10,color:TEXT2,fontFamily:"monospace"}}>{s} <span style={{color:"#fff",fontWeight:700}}>{stats[s.toLowerCase()]}</span></span></div>))}</div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>setShowGenre(true)} style={{width:28,height:28,border:`1px solid ${activeGenre!=="Todas"&&activeGenre!=="Todos"?A:BORDER}`,background:activeGenre!=="Todas"&&activeGenre!=="Todos"?`${A}22`:"transparent",color:activeGenre!=="Todas"&&activeGenre!=="Todos"?A:TEXT2,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm2 5h12v2H6zm3 5h6v2H9z"/></svg></button>
                  <button onClick={()=>setShowShare(true)} style={{width:28,height:28,border:`1px solid ${BORDER}`,background:"transparent",color:TEXT2,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg></button>
                </div>
              </div>
            </div>
          </div>

          <div style={{flex:1,padding:"0 12px 110px",position:"relative",zIndex:10}} onClick={filtered.length===0?handleEmptyClick:undefined}>
            {filtered.length===0?<div style={{position:"relative",background:PANEL2,border:`0.5px solid ${TEXT3}44`,borderRadius:2,padding:"48px 20px",textAlign:"center",marginTop:8}}><div style={{fontSize:36,marginBottom:12,opacity:0.1,color:A}}>{CAT_ICONS[tab]}</div><div style={{fontSize:12,color:TEXT2,fontFamily:"monospace"}}>// SIN REGISTROS</div><div style={{fontSize:11,color:TEXT3,marginTop:4,fontFamily:"monospace"}}>PULSA + PARA AÑADIR</div></div>:<div style={{display:"grid",gridTemplateColumns:tab==="Links"?"1fr":"repeat(3,1fr)",gap:8,paddingTop:2}}>{filtered.map((item,i)=>tab==="Links"?<LinkCard key={item.id} item={item} idx={i} onClick={()=>setSelected(item)} A={A}/>:<ItemCard key={item.id} item={item} idx={i} onClick={()=>setSelected(item)} A={A}/>)}</div>}
          </div>

          <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",zIndex:50}}>
            <button onClick={()=>tab==="Links"?setShowAddLink(true):setShowAdd(true)} className="fab-btn" style={{width:64,height:64,background:`${A}18`,border:`1px solid ${A}`,color:A,fontSize:tab==="Links"?22:32,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace",boxShadow:`0 0 20px ${A}44`}}>{tab==="Links"?"⬢":"+"}</button>
          </div>

          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:390,zIndex:10,padding:"6px 12px 14px",boxSizing:"border-box",background:"rgba(3,6,15,0.95)",backdropFilter:"blur(10px)",borderTop:`0.5px solid ${BORDER}`}}>
            <div style={{display:"flex",gap:6}}>{CATEGORIES.map(c=>(<button key={c} onClick={()=>{setTab(c);setActiveGenre("Todas");}} className="nav-btn" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,border:tab===c?`1px solid ${A}44`:"1px solid transparent",background:tab===c?`${A}10`:"transparent",color:tab===c?A:TEXT3,padding:"6px 0",position:"relative",transition:"all 0.2s",borderRadius:2}}>{tab===c&&<div style={{position:"absolute",top:0,left:"10%",right:"10%",height:"1px",background:A,boxShadow:`0 0 4px ${A}`}}/>}<PixelIcon grid={PIXEL_GRIDS[c]} size={18}/><span style={{fontSize:7,fontWeight:tab===c?700:400,fontFamily:"monospace",letterSpacing:"0.04em"}}>{c==="Películas"?"PELIS":c==="Documentales"?"DOCS":c.toUpperCase()}</span></button>))}</div>
          </div>

          {showGenre&&<div onClick={()=>setShowGenre(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:100,display:"flex",alignItems:"flex-end"}}><div onClick={e=>e.stopPropagation()} style={{width:"100%",background:PANEL,borderRadius:"12px 12px 0 0",border:`1px solid ${A}44`,borderBottom:"none",padding:"16px 16px 44px",boxSizing:"border-box"}}><div style={{width:36,height:2,background:SURFACE3,margin:"0 auto 16px"}}/><div style={{fontSize:10,color:TEXT2,fontFamily:"monospace",marginBottom:14}}>// FILTRAR</div><div style={{display:"flex",flexWrap:"wrap",gap:7}}>{GENRES[tab].map(g=><button key={g} onClick={()=>{setActiveGenre(g);setShowGenre(false);}} style={{padding:"7px 12px",border:activeGenre===g?`1px solid ${A}`:`0.5px solid ${BORDER}`,background:activeGenre===g?`${A}18`:"transparent",color:activeGenre===g?A:TEXT2,fontSize:11,fontFamily:"monospace"}}>{g.toUpperCase()}</button>)}</div></div></div>}
          {showShare&&<div onClick={()=>setShowShare(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:100,display:"flex",alignItems:"flex-end"}}><div onClick={e=>e.stopPropagation()} style={{width:"100%",background:PANEL,borderRadius:"12px 12px 0 0",border:`1px solid ${A}44`,borderBottom:"none",padding:"16px 16px 40px",boxSizing:"border-box"}}><div style={{width:36,height:2,background:SURFACE3,margin:"0 auto 16px"}}/><div style={{fontSize:15,fontWeight:700,marginBottom:16,fontFamily:"monospace",color:TEXT}}>{tab.toUpperCase()} — {filtered.length} REG.</div><button onClick={()=>{exportToPDF(items,tab);setShowShare(false);}} style={{width:"100%",padding:13,border:`1px solid ${A}44`,background:SURFACE2,color:TEXT,fontSize:13,marginBottom:8,fontFamily:"monospace"}}>[ EXPORTAR PDF ]</button><button onClick={()=>{shareWhatsApp(items,tab);setShowShare(false);}} style={{width:"100%",padding:13,border:`1px solid ${A}44`,background:SURFACE2,color:TEXT,fontSize:13,fontFamily:"monospace"}}>[ WHATSAPP ]</button></div></div>}

          {showProfile&&<ProfilePanel profile={profile} onSave={p=>{saveProfile(p);setShowProfile(false);}} onClose={()=>setShowProfile(false)} A={A} items={items} following={following} onFollowById={handleFollowById} onOpenUser={u=>{setViewingUser(u);}}/>}
          {viewingUser&&<UserProfileView userData={viewingUser} onClose={()=>setViewingUser(null)} onClone={handleClone} A={A}/>}
          {showAdd&&<AddSheet tab={tab} setTab={setTab} onAdd={addItem} loading={loading} onClose={()=>setShowAdd(false)} A={A}/>}
          {showAddLink&&<AddLinkSheet onAdd={addLink} loading={loading} onClose={()=>setShowAddLink(false)} A={A}/>}
          {selected&&<DetailPanel item={selected} onClose={()=>setSelected(null)} onDelete={id=>save(items.filter(i=>i.id!==id))} onUpdate={updated=>save(items.map(i=>i.id===updated.id?updated:i))} A={A}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
