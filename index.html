async function fetchInfo(title) {
  try {
    const r = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&language=es-ES`);
    const d = await r.json();
    const result = d.results?.[0];
    if (!result) return null;
    const poster = result.poster_path ? `https://image.tmdb.org/t/p/w500${result.poster_path}` : null;
    const year = (result.release_date || result.first_air_date || "").slice(0,4);
    const plot = result.overview || "";
    const genreMap = {28:"Acción",12:"Aventura",16:"Animación",35:"Comedia",80:"Crimen",99:"Documental",18:"Drama",14:"Fantasía",36:"Histórica",27:"Terror",9648:"Misterio",10749:"Romance",878:"Ciencia ficción",53:"Thriller",10752:"Bélica",37:"Western"};
    const genre = (result.genre_ids||[]).slice(0,3).map(id=>genreMap[id]).filter(Boolean).join(", ");
    return { poster, year, plot, genre };
  } catch { return null; }
}

async function fetchLinkInfo(url) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:200,
        messages:[{role:"user", content:`Given this URL: "${url}", reply ONLY with raw JSON no markdown: {"title":"page title","description":"one sentence in Spanish","type":"Artículo|Vídeo|Herramienta|Tutorial|Noticia|Podcast|Música|Otro","domain":"domain.com"}`}]
      })
    });
    const d = await res.json();
    const m = (d.content?.[0]?.text||"").match(/\{[\s\S]*\}/);
    return m ? JSON.parse(m[0]) : null;
  } catch { return null; }
}

function exportToPDF(items, category) {
  const list = items.filter(i=>i.category===category);
  const se = {"Visto":"🟢","Viendo":"🔵","Pendiente":"🔴"};
  const rows = list.map((item,idx)=>`<tr><td>${idx+1}</td><td><strong>${item.title}</strong></td><td>${item.year||item.domain||"—"}</td><td>${item.genre||"—"}</td><td>${se[item.status]||"🔴"} ${item.status||"Pendiente"}</td><td>${item.rating?"★".repeat(item.rating):"—"}</td></tr>`).join("");
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:Arial;background:#03060f;color:#e8f4ff;padding:40px}h1{color:#00d4ff}table{width:100%;border-collapse:collapse}th{text-align:left;padding:10px 8px;color:#00d4ff;font-size:11px;text-transform:uppercase;border-bottom:1px solid rgba(0,212,255,0.2)}td{padding:10px 8px;border-bottom:1px solid rgba(0,212,255,0.08);font-size:13px}</style></head><body><h1>MM · Menuda Movie</h1><p style="color:#6a8aaa">${category} · ${list.length} títulos · ${new Date().toLocaleDateString("es")}</p><table><thead><tr><th>#</th><th>Título</th><th>Año</th><th>Género</th><th>Estado</th><th>Val.</th></tr></thead><tbody>${rows}</tbody></table></body></html>`;
  const w = window.open("","_blank"); if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),800);}
}

function shareWhatsApp(items, category) {
  const list = items.filter(i=>i.category===category);
  const si = {"Visto":"✅","Viendo":"⏳","Pendiente":"❌"};
  const lines = list.map((item,i)=>`${i+1}. ${si[item.status]||"❌"} *${item.title}*${item.year?` (${item.year})`:item.domain?` [${item.domain}]`:""}${item.rating?" "+"⭐".repeat(item.rating):""}`).join("\n");
  window.open(`https://wa.me/?text=${encodeURIComponent(`🎬 *MM Menuda Movie*\nMi colección de ${category} (${list.length} títulos):\n\n${lines}\n\n_MM Menuda Movie_`)}`, "_blank");
}

function LogoBase({ size }) {
  const [phase, setPhase] = useState(0);
  const [glitching, setGlitching] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => {
      setGlitching(true);
      setTimeout(() => { setPhase(p=>(p+1)%LOGO_PHASES.length); setGlitching(false); }, 120);
    }, LOGO_PHASES[phase].dur);
    return () => clearTimeout(t);
  }, [phase]);
  const grid = LOGO_PHASES[phase].grid;
  return (
    <svg width={size} height={size} viewBox="0 0 17 16" style={{imageRendering:"pixelated",filter:glitching?`drop-shadow(0 0 6px ${ACCENT}) drop-shadow(3px 0 0 rgba(255,0,100,0.8)) drop-shadow(-3px 0 0 rgba(0,255,200,0.8))`:`drop-shadow(0 0 10px ${ACCENT}88)`,transform:glitching?"translateX(3px)":"translateX(0)",transition:"filter 0.05s,transform 0.05s"}}>
      {grid.map((row,y)=>row.map((cell,x)=>{ if(!cell) return null; return React.createElement('rect',{key:`${x}-${y}`,x,y,width:1,height:1,fill:cell===2?"#0a1628":ACCENT}); }))}
    </svg>
  );
}

function GlitchEffect({ onDone }) {
  const [frame, setFrame] = useState(0);
  const slicesRef = useRef(Array.from({length:14},()=>({h:Math.random()*16+3,y:Math.random()*100,shift:(Math.random()-0.5)*50,color:Math.random()>0.6,delay:Math.floor(Math.random()*8)})));
  useEffect(()=>{let i=0;const iv=setInterval(()=>{i++;setFrame(i);if(i>=18){clearInterval(iv);onDone();}},28);return()=>clearInterval(iv);},[]);
  return (
    <div style={{position:"fixed",inset:0,zIndex:500,pointerEvents:"none",overflow:"hidden"}}>
      {slicesRef.current.map((s,i)=>frame>s.delay?<div key={i} style={{position:"absolute",left:0,right:0,top:`${s.y}%`,height:`${s.h}px`,transform:`translateX(${s.shift*(frame%2===0?1:-0.7)}px)`,background:s.color?`rgba(${frame%3===0?"0,212,255":"0,102,255"},0.2)`:`rgba(0,0,0,0.5)`,mixBlendMode:s.color?"screen":"darken"}}/>:null)}
    </div>
  );
}

function App() {
  const [items, setItems] = useState([]);
  const [tab, setTab] = useState("Películas");
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [showAddLink, setShowAddLink] = useState(false);
  const [showShare, setShowShare] = useState(false);
  const [showGenre, setShowGenre] = useState(false);
  const [activeGenre, setActiveGenre] = useState("Todas");
  const [selected, setSelected] = useState(null);
  const [glitches, setGlitches] = useState([]);
  const [fingerprints, setFingerprints] = useState([]);
  const clickCountRef = useRef(0);
  const clickTimerRef = useRef(null);
  const shakeRef = useRef({ lastX: null, lastY: null, lastT: null });

  function triggerGlitch(intensity=1, originY=null) {
    const id = Date.now() + Math.random();
    const count = Math.min(Math.ceil(intensity), 6);
    const pct = originY !== null ? (originY / window.innerHeight) * 100 : 50;
    const newGlitches = Array.from({length:count}, (_,i) => ({
      id: id + i,
      h: Math.random()*18+2,
      y: Math.max(0, Math.min(95, pct + (Math.random()-0.5)*25)),
      shift: (Math.random()-0.5) * 55 * intensity,
      color: Math.random()>0.5,
    }));
    setGlitches(g => [...g, ...newGlitches]);
    setTimeout(() => setGlitches(g => g.filter(x => !newGlitches.find(n => n.id === x.id))), 180 + intensity * 60);
  }

  function handleEmptyClick(e) {
    const x = e.clientX, y = e.clientY;
    const id = Date.now() + Math.random();
    setFingerprints(f => [...f, { id, x, y }]);
    setTimeout(() => setFingerprints(f => f.filter(p => p.id !== id)), 1800);
    clickCountRef.current += 1;
    clearTimeout(clickTimerRef.current);
    triggerGlitch(clickCountRef.current, y);
    clickTimerRef.current = setTimeout(() => { clickCountRef.current = 0; }, 1200);
  }

  useEffect(() => {
    function handleMotion(e) {
      const acc = e.accelerationIncludingGravity;
      if (!acc) return;
      const now = Date.now();
      const s = shakeRef.current;
      if (s.lastX === null) { s.lastX = acc.x; s.lastY = acc.y; s.lastT = now; return; }
      const dt = (now - s.lastT) / 1000;
      if (dt < 0.05) return;
      const force = (Math.abs((acc.x||0)-s.lastX) + Math.abs((acc.y||0)-s.lastY)) / dt;
      s.lastX = acc.x; s.lastY = acc.y; s.lastT = now;
      if (force > 80) triggerGlitch(Math.min(force/40, 5));
    }
    window.addEventListener("devicemotion", handleMotion);
    return () => window.removeEventListener("devicemotion", handleMotion);
  }, []);

  useEffect(()=>{try{const v=localStorage.getItem("media-items");if(v)setItems(JSON.parse(v));}catch{}},[]);
  function save(list){setItems(list);try{localStorage.setItem("media-items",JSON.stringify(list));}catch{}}

  async function addItem(rawTitle,cat){
    if(!rawTitle.trim())return;
    setLoading(true);setToast("// BUSCANDO PORTADA...");
    const info=await fetchInfo(rawTitle.trim());
    save([{id:Date.now(),title:rawTitle.trim(),category:cat,year:info?.year||null,plot:info?.plot||null,genre:info?.genre||null,director:null,poster:info?.poster||null,rating:0,status:"Pendiente",addedAt:Date.now()},...items]);
    setShowAdd(false);setLoading(false);
    setToast(info?.poster?"// PORTADA ENCONTRADA ✓":"// REGISTRADO");
    setTimeout(()=>setToast(""),2500);
  }

  async function addLink(url,cat,tag){
    if(!url.trim())return;
    setLoading(true);setToast("// ANALIZANDO URL...");
    const info=await fetchLinkInfo(url.trim());
    let domain="";try{domain=new URL(url.trim()).hostname.replace("www.","");}catch{}
    save([{id:Date.now(),title:info?.title||url,description:info?.description||null,url:url.trim(),domain:info?.domain||domain,category:cat,genre:tag||info?.type||"Otro",poster:null,rating:0,status:"Pendiente",addedAt:Date.now()},...items]);
    setShowAddLink(false);setLoading(false);
    setToast("// LINK GUARDADO ✓");
    setTimeout(()=>setToast(""),2000);
  }

  const matchesGenre=(ig,f)=>{if(f==="Todas"||f==="Todos")return true;if(!ig)return false;const n=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[-\s]/g,"");const ff=n(f);return ig.split(/[,\/]/).map(g=>n(g.trim())).some(g=>g.includes(ff)||ff.includes(g));};
  const filtered=items.filter(i=>i.category===tab&&matchesGenre(i.genre,activeGenre));
  const stats={visto:filtered.filter(i=>i.status==="Visto").length,viendo:filtered.filter(i=>i.status==="Viendo").length,pendiente:filtered.filter(i=>i.status==="Pendiente"||!i.status).length};

  return (
    <div style={{maxWidth:390,margin:"0 auto",minHeight:"100vh",background:BG,display:"flex",flexDirection:"column",fontFamily:"system-ui,sans-serif",color:TEXT,position:"relative"}}>
      <div className="dot-bg"/>
      <div className="vhs-noise"/>

      {/* Fingerprints */}
      {fingerprints.map(p=>(
        <div key={p.id} className="fingerprint" style={{left:p.x-30,top:p.y-30,width:60,height:60}}>
          <svg viewBox="0 0 60 60" width="60" height="60">
            <ellipse cx="30" cy="30" rx="8" ry="8" fill="none" stroke={ACCENT} strokeWidth="1.2"/>
            <ellipse cx="30" cy="30" rx="13" ry="12" fill="none" stroke={ACCENT} strokeWidth="1"/>
            <ellipse cx="30" cy="30" rx="18" ry="17" fill="none" stroke={ACCENT} strokeWidth="0.9"/>
            <ellipse cx="30" cy="30" rx="23" ry="21" fill="none" stroke={ACCENT} strokeWidth="0.8"/>
            <ellipse cx="30" cy="30" rx="27" ry="25" fill="none" stroke={ACCENT} strokeWidth="0.7"/>
            <line x1="30" y1="22" x2="30" y2="5" stroke={ACCENT} strokeWidth="0.8"/>
            <line x1="30" y1="38" x2="30" y2="55" stroke={ACCENT} strokeWidth="0.8"/>
          </svg>
        </div>
      ))}

      {/* Ambient glitches */}
      {glitches.map(g=>(
        <div key={g.id} style={{position:"fixed",left:0,right:0,top:`${g.y}%`,height:`${g.h}px`,zIndex:9998,pointerEvents:"none",transform:`translateX(${g.shift}px)`,background:g.color?`rgba(0,212,255,0.22)`:`rgba(0,0,0,0.6)`,mixBlendMode:g.color?"screen":"darken"}}/>
      ))}

      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:`rgba(0,212,255,0.1)`,border:`1px solid ${ACCENT}`,color:ACCENT,padding:"8px 16px",fontSize:12,fontWeight:600,zIndex:400,whiteSpace:"nowrap",fontFamily:"monospace"}}>{toast}</div>}

      <div style={{padding:"10px 12px",zIndex:10,position:"relative"}}>
        <div style={{position:"relative",background:PANEL2,border:`0.5px solid ${ACCENT}44`,borderRadius:2,padding:"12px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <LogoBase size={24}/>
            <h1 style={{fontSize:13,fontWeight:800,margin:0,fontFamily:"'Courier New',monospace",letterSpacing:"0.18em"}}>
              <span style={{color:TEXT}}>MENUDA</span>
              <span style={{color:ACCENT,textShadow:`0 0 14px ${ACCENT}`,marginLeft:3}}>MOVIE</span>
            </h1>
          </div>
        </div>
      </div>

      <div style={{padding:"14px 12px 8px",zIndex:10,position:"relative"}}>
        <div style={{position:"relative",background:PANEL2,border:`0.5px solid ${ACCENT}44`,borderRadius:2,padding:"8px 12px"}}>
          <div style={{position:"absolute",top:-9,left:10,background:PANEL2,padding:"0 6px",fontSize:10,color:ACCENT,fontFamily:"'Courier New',monospace",fontWeight:700}}>STATUS</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:4}}>
            <div style={{display:"flex",gap:14}}>
              {[["VISTO","#00ff88"],["VIENDO",ACCENT],["PENDIENTE","#ff3366"]].map(([s,c])=>(
                <div key={s} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:7,height:7,background:c,boxShadow:`0 0 5px ${c}`}}/>
                  <span style={{fontSize:10,color:TEXT2,fontFamily:"monospace"}}>{s} <span style={{color:"#ffffff",fontWeight:700}}>{stats[s.toLowerCase()]}</span></span>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setShowGenre(true)} style={{width:28,height:28,border:`1px solid ${activeGenre!=="Todas"&&activeGenre!=="Todos"?ACCENT:BORDER}`,background:activeGenre!=="Todas"&&activeGenre!=="Todos"?`rgba(0,212,255,0.1)`:"transparent",color:activeGenre!=="Todas"&&activeGenre!=="Todos"?ACCENT:TEXT2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm2 5h12v2H6zm3 5h6v2H9z"/></svg>
              </button>
              <button onClick={()=>setShowShare(true)} style={{width:28,height:28,border:`1px solid ${BORDER}`,background:"transparent",color:TEXT2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div style={{flex:1,padding:"0 12px 110px",position:"relative",zIndex:10}} onClick={filtered.length===0?handleEmptyClick:undefined}>
        {filtered.length===0
          ?<div style={{position:"relative",background:PANEL2,border:`0.5px solid ${TEXT3}44`,borderRadius:2,padding:"48px 20px",textAlign:"center",marginTop:8}}>
            <div style={{fontSize:36,marginBottom:12,opacity:0.1,color:ACCENT}}>{CAT_ICONS[tab]}</div>
            <div style={{fontSize:12,color:TEXT2,fontFamily:"monospace"}}>// SIN REGISTROS</div>
            <div style={{fontSize:11,color:TEXT3,marginTop:4,fontFamily:"monospace"}}>PULSA + PARA AÑADIR</div>
          </div>
          :<div style={{display:"grid",gridTemplateColumns:tab==="Links"?"1fr":"repeat(3,1fr)",gap:8,paddingTop:2}}>
            {filtered.map((item,i)=>tab==="Links"
              ?<LinkCard key={item.id} item={item} idx={i} onClick={()=>setSelected(item)}/>
              :<ItemCard key={item.id} item={item} idx={i} onClick={()=>setSelected(item)}/>
            )}
          </div>
        }
      </div>

      <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",zIndex:50}}>
        <button onClick={()=>tab==="Links"?setShowAddLink(true):setShowAdd(true)} className="fab-btn" style={{width:64,height:64,background:`rgba(0,212,255,0.1)`,border:`1px solid ${ACCENT}`,color:ACCENT,fontSize:tab==="Links"?22:32,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace"}}>
          {tab==="Links"?"⬢":"+"}
        </button>
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:390,zIndex:10,padding:"6px 12px 14px",boxSizing:"border-box",background:"rgba(3,6,15,0.95)",backdropFilter:"blur(10px)",borderTop:`1px solid ${BORDER}`}}>
        <div style={{display:"flex",gap:6}}>
          {CATEGORIES.map(c=>(
            <button key={c} onClick={()=>{setTab(c);setActiveGenre("Todas");}} className="nav-btn" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,border:tab===c?`1px solid ${ACCENT}44`:`1px solid transparent`,background:tab===c?`rgba(0,212,255,0.06)`:"transparent",color:tab===c?ACCENT:TEXT3,cursor:"pointer",padding:"6px 0",position:"relative",transition:"all 0.2s",borderRadius:2}}>
              {tab===c&&<div style={{position:"absolute",top:0,left:"10%",right:"10%",height:"1px",background:ACCENT,boxShadow:`0 0 4px ${ACCENT}`}}/>}
              <PixelIcon grid={PIXEL_GRIDS[c]} size={18}/>
              <span style={{fontSize:7,fontWeight:tab===c?700:400,fontFamily:"monospace",letterSpacing:"0.04em"}}>{c==="Películas"?"PELIS":c==="Documentales"?"DOCS":c.toUpperCase()}</span>
            </button>
          ))}
        </div>
      </div>

      {showGenre&&<div onClick={()=>setShowGenre(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:100,display:"flex",alignItems:"flex-end"}}>
        <div onClick={e=>e.stopPropagation()} style={{width:"100%",background:PANEL,borderRadius:"12px 12px 0 0",border:`1px solid ${BORDER2}`,borderBottom:"none",padding:"16px 16px 44px",boxSizing:"border-box"}}>
          <div style={{width:36,height:2,background:SURFACE3,margin:"0 auto 16px"}}/>
          <div style={{fontSize:10,color:TEXT2,fontFamily:"monospace",marginBottom:14}}>// FILTRAR</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {GENRES[tab].map(g=><button key={g} onClick={()=>{setActiveGenre(g);setShowGenre(false);}} style={{padding:"7px 12px",border:activeGenre===g?`1px solid ${ACCENT}`:`0.5px solid ${BORDER}`,background:activeGenre===g?`rgba(0,212,255,0.1)`:"transparent",color:activeGenre===g?ACCENT:TEXT2,cursor:"pointer",fontSize:11,fontFamily:"monospace"}}>{g.toUpperCase()}</button>)}
          </div>
        </div>
      </div>}

      {showShare&&<div onClick={()=>setShowShare(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:100,display:"flex",alignItems:"flex-end"}}>
        <div onClick={e=>e.stopPropagation()} style={{width:"100%",background:PANEL,borderRadius:"12px 12px 0 0",border:`1px solid ${BORDER2}`,borderBottom:"none",padding:"16px 16px 40px",boxSizing:"border-box"}}>
          <div style={{width:36,height:2,background:SURFACE3,margin:"0 auto 16px"}}/>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16,fontFamily:"monospace",color:TEXT}}>{tab.toUpperCase()} — {filtered.length} REG.</div>
          <button onClick={()=>{exportToPDF(items,tab);setShowShare(false);}} style={{width:"100%",padding:13,border:`1px solid ${BORDER2}`,background:SURFACE2,color:TEXT,fontSize:13,cursor:"pointer",marginBottom:8,fontFamily:"monospace"}}>[ EXPORTAR PDF ]</button>
          <button onClick={()=>{shareWhatsApp(items,tab);setShowShare(false);}} style={{width:"100%",padding:13,border:`1px solid ${BORDER2}`,background:SURFACE2,color:TEXT,fontSize:13,cursor:"pointer",fontFamily:"monospace"}}>[ WHATSAPP ]</button>
        </div>
      </div>}

      {showAdd&&<AddSheet tab={tab} setTab={setTab} onAdd={addItem} loading={loading} onClose={()=>setShowAdd(false)}/>}
      {showAddLink&&<AddLinkSheet onAdd={addLink} loading={loading} onClose={()=>setShowAddLink(false)}/>}
      {selected&&<DetailPanel item={selected} onClose={()=>setSelected(null)} onDelete={id=>save(items.filter(i=>i.id!==id))} onUpdate={updated=>save(items.map(i=>i.id===updated.id?updated:i))}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
